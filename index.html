<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moon Knight · Survey Link Generator</title>
<script>
const APP_VERSION = 2;

fetch("version.json?rand=" + Date.now())
.then(res => res.json())
.then(data => {
  if (APP_VERSION < data.latestVersion) {
    document.body.innerHTML = `
      <div style="font-family:Arial;text-align:center;margin-top:35%">
        <h2>New Update Available</h2>
        <p>Please download the latest Horamavu Survey App</p>
        <a href="${data.updateUrl}"
           style="background:#ff1493;color:white;padding:15px 25px;border-radius:10px;
           text-decoration:none;font-size:18px;display:inline-block;margin-top:15px;">
           Download Update
        </a>
      </div>`;
  }
});
</script>

<style>
    /* MOON KNIGHT MARVEL THEME — dark, mystic, gold & white */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        font-family: 'Cinzel', 'Trajan Pro', 'Georgia', serif;
        background: #0b0c10;
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 30%),
            radial-gradient(circle at 90% 70%, rgba(200, 160, 50, 0.05) 0%, transparent 30%),
            linear-gradient(145deg, #0a0a0f 0%, #1a140e 100%);
        min-height: 100vh;
        padding: 20px;
        margin: 0;
        color: #e0d9c6;
        position: relative;
    }
    /* crescent moon watermark */
    body::after {
        content: "☾";
        position: fixed;
        bottom: 20px;
        right: 30px;
        font-size: 120px;
        opacity: 0.08;
        color: #c9b037;
        font-family: 'Arial', sans-serif;
        transform: rotate(15deg);
        pointer-events: none;
        z-index: 0;
    }
    .container {
        max-width: 1300px;
        margin: 0 auto;
        background: rgba(10, 8, 12, 0.85);
        backdrop-filter: blur(4px);
        border: 2px solid #b89b5b;
        border-radius: 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 2px #4f3b1e inset, 0 0 20px #b89b5b55;
        padding: 30px;
        position: relative;
        z-index: 2;
        transition: box-shadow 0.3s;
    }
    .container:hover {
        box-shadow: 0 20px 50px #000, 0 0 0 3px #c9ae5b inset, 0 0 30px #f5e6b0;
    }
    /* Khonshu's eye accents */
    .container::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 15%;
        width: 70px;
        height: 70px;
        background: radial-gradient(circle, #f9e076 0%, transparent 70%);
        border-radius: 50%;
        opacity: 0.2;
        filter: blur(10px);
        z-index: -1;
    }
    .container::after {
        content: "";
        position: absolute;
        bottom: -10px;
        right: 15%;
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, #bfa152 0%, transparent 70%);
        border-radius: 50%;
        opacity: 0.15;
        filter: blur(15px);
    }
    h1 {
        text-align: center;
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #f0e6d0;
        text-shadow: 
            3px 3px 0 #2a1f0e,
            6px 6px 0 #000000,
            0 0 15px #f5d742,
            0 0 30px #b88a2e;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 3px double #b89b5b;
        font-family: 'Cinzel', 'Georgia', serif;
        position: relative;
    }
    h1:before {
        content: "☾ 𓃥 ☽";
        font-size: 28px;
        display: block;
        color: #cfb26b;
        letter-spacing: 12px;
        margin-bottom: 8px;
        text-shadow: 0 0 8px gold;
    }
    /* moons & dots */
    .moon-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #c9af5b;
        border-radius: 50%;
        box-shadow: 0 0 12px #ffd966;
        opacity: 0.7;
    }
    .dot-1 { top: 30px; left: 30px; }
    .dot-2 { top: 30px; right: 30px; }
    .dot-3 { bottom: 30px; left: 30px; }
    .dot-4 { bottom: 30px; right: 30px; }

    /* file section — like a marble altar */
    .file-section {
        background: #161010c0;
        border: 2px solid #7a632f;
        border-radius: 30px;
        padding: 30px 20px;
        margin: 30px 0;
        text-align: center;
        backdrop-filter: blur(4px);
        box-shadow: 0 0 0 1px #ae914b, inset 0 0 30px #1f160c;
        position: relative;
    }
    .file-section:before {
        content: "𓋴𓍯𓃀𓂧";
        font-size: 20px;
        color: #b49450;
        letter-spacing: 6px;
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%);
        background: #0e0b0a;
        padding: 4px 30px;
        border-radius: 40px;
        border: 1px solid #ab8b49;
        white-space: nowrap;
        text-shadow: 0 0 6px #e0b45a;
    }
    .file-input-container {
        display: flex;
        flex-direction: column;
        align-items: center;

    }
    .file-label {
        font-size: 22px;

        background: #221d14;

        color: #eedba7;
        padding: 12px 32px;
        border-radius: 50px;

        box-shadow: 0 8px 0 #2b1f0c, 0 10px 20px black;
        transition: 0.1s ease;
        letter-spacing: 2px;
    }
    .file-label:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 0 #2b1f0c, 0 15px 25px black;
        background: #332b1c;
        color: #ffeec2;
    }
    .file-name {
        color: #e3d1a3;
        font-size: 18px;
        background: #0b0705;
        padding: 8px 25px;
        border-radius: 40px;
        border: 1px solid #8a713a;
        max-width: 100%;
    }
    input[type="file"] { display: none; }

    /* button group — egyptian gold */
    .button-group {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 30px 0;
    }
    .btn {
        font-family: 'Cinzel', serif;
        padding: 14px 30px;
        border: none;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #0d0b07;
        background: linear-gradient(145deg, #e4cf9a, #b38e44);
        border: 1px solid #ffebbb;
        box-shadow: 0 6px 0 #5b401c, 0 10px 20px #00000080;
        cursor: pointer;
        transition: 0.1s ease;
        position: relative;
        overflow: hidden;
    }
    .btn:before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, #ffffff60 10%, transparent 60%);
        opacity: 0;
        transition: 0.3s;
    }
    .btn:hover:before {
        opacity: 0.5;
        transform: scale(1.2);
    }
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 0 #5b401c, 0 15px 25px black;
        background: linear-gradient(145deg, #f3ddac, #c9a249);
    }
    .btn:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #5b401c;
    }
    .btn:disabled {
        opacity: 0.45;
        transform: none;
        box-shadow: 0 4px 0 #3e2f18;
        background: #5e543c;
        border-color: #786c48;
        pointer-events: none;
    }
    /* primary variants */
    .btn-primary { background: linear-gradient(145deg, #bda15a, #7e5f2b); color: #140e06; }

    /* speech bubble — now a moon knight quote */
    .speech-bubble {
        position: absolute;
        bottom: -20px;
        right: 30px;
        background: #1e1912;
        border: 2px solid #dbb45c;
        color: #fae7b3;
        padding: 10px 20px;
        border-radius: 40px;
        font-size: 16px;
        font-style: italic;
        box-shadow: 0 8px 0 #2a1f0b;
        transform: rotate(2deg);
    }
    .speech-bubble:after {
        content: '';
        position: absolute;
        bottom: -14px;
        right: 30px;
        border-width: 14px 12px 0;
        border-style: solid;
        border-color: #dbb45c transparent;
    }

    /* table — dark mystic */
    .table-container {
        border: 3px solid #a38648;
        border-radius: 30px;
        overflow: hidden;
        margin-top: 25px;
        box-shadow: 0 0 0 2px #2f250f inset, 0 15px 30px black;
        background: #0c0907;
        max-height: 500px;
        overflow-y: auto;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: #0a0806;
        color: #eedcc0;
    }
    th {
        background: #2a1f12;
        color: #e9cf91;
        font-size: 20px;
        padding: 18px 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-bottom: 4px solid #ab8a40;
        text-shadow: 0 2px 0 #000;

        z-index: 5;
    }
    td {
        padding: 14px 10px;
        border-bottom: 1px solid #584a2e;
        background: rgba(12, 9, 6, 0.8);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #221d12; }

    /* hide survey model / generated link visually */
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4) { display: none; }

    /* copy button — moon-knight crescent */
    .copy-btn {
        background: #312715;
        border: 2px solid #b4944c;
        color: #ffefc0;
        padding: 10px 22px;
        border-radius: 40px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 0 #281e0c;
        transition: 0.1s;
        font-family: 'Cinzel', serif;
        letter-spacing: 1.5px;
        position: relative;
    }
    .copy-btn:hover {
        background: #4d3c1f;
        transform: translateY(-2px);
        box-shadow: 0 6px 0 #281e0c;
    }
    .copy-btn.copied {
        background: #3d3c1a;
        border-color: #ffd966;
        color: #ffffff;
        animation: moonPulse 0.4s ease;
        pointer-events: none;
        opacity: 0.8;
    }
    @keyframes moonPulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 #f5e56b; }
        30% { transform: scale(1.15); box-shadow: 0 0 25px 5px #f9d77e; background: #7a631f; }
        100% { transform: scale(1); box-shadow: 0 0 0 0 #d4a259; }

    /* status */
    .status {
        text-align: center;
        padding: 18px;
        border-radius: 60px;
        font-size: 20px;
        background: #181308;
        border: 2px solid #b69d5a;
        color: #ffeca5;
        margin: 20px 0;
        box-shadow: 0 6px 0 #3f3117;
    }

    /* filter + search */
    .filter-container, .search-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
        flex-wrap: wrap;
    }
    .filter-btn, .search-btn, .clear-search {
        background: #201c12;
        border: 2px solid #a08143;
        color: #eedba7;
        padding: 12px 25px;
        border-radius: 50px;
        font-size: 17px;
        font-weight: bold;
        font-family: 'Cinzel', serif;
        cursor: pointer;
        box-shadow: 0 4px 0 #2f2311;
        transition: 0.1s;
    }
    .filter-btn:hover, .search-btn:hover, .clear-search:hover {
        background: #3c301b;
        transform: translateY(-2px);
        box-shadow: 0 6px 0 #2f2311;
    }
    .filter-btn.active {
        background: #7b6437;
        color: #0c0902;
        border-color: #eecd87;
        box-shadow: 0 0 15px #fddf9e;
    }
    .search-box {
        background: #1f1a0f;
        border: 2px solid #b38e4c;
        color: #ffeec2;
        padding: 12px 20px;
        border-radius: 60px;
        width: 300px;
        font-size: 17px;
        font-family: 'Cinzel', serif;
        box-shadow: inset 0 4px 6px #00000055, 0 2px 0 #352915;
    }

    /* QR MODAL — moon knight theme */
    .qr-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #020202dd;
        backdrop-filter: blur(10px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .qr-modal-content {
        background: #16100b;
        border: 6px solid #9e8648;
        border-radius: 60px;
        padding: 30px;
        max-width: 700px;
        width: 90%;
        box-shadow: 0 0 0 3px #2c1f0b, 0 30px 50px black, 0 0 50px #a8873c;
    }
    .qr-modal-title {
        font-size: 40px;
        color: #efd995;
        text-align: center;
        margin: 10px 0;
        text-shadow: 0 4px 0 #2d210b;
    }
    .close-modal {
        background: #946b28;
        border: 3px solid #e5c375;
        color: white;
        font-size: 28px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: auto;
    }
    .qr-display {
        background: #020100;
        border: 3px solid #ba9a51;
        border-radius: 40px;
        padding: 20px;
        margin: 20px 0;
        overflow: hidden;
    }
    .qr-slides { display: flex; transition: transform 0.3s ease; }
    .qr-slide { min-width: 100%; text-align: center; }
    .qr-code { background: white; padding: 15px; border-radius: 25px; display: inline-block; margin: 10px 0; }
    .qr-nav-btn {
        background: #392f1b;
        border: 2px solid #b48d44;
        color: #ffd98c;
        padding: 12px 30px;
        border-radius: 50px;
        font-size: 20px;
        cursor: pointer;
    }
    .qr-counter {
        color: #dbb44b;
        font-size: 22px;
        text-align: center;
    }

    /* MOON KNIGHT ANIMATIONS — when link copied */
    .moon-glow {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 9999;
        background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #f9e07620 0%, transparent 60%);
        mix-blend-mode: hard-light;
        animation: fadeGlow 0.8s ease-out;
    }
    @keyframes fadeGlow { 0% { opacity: 1; } 100% { opacity: 0; } }

    .crescent-strike {
        position: fixed;
        font-size: 80px;
        color: #faea9f;
        filter: drop-shadow(0 0 25px gold);
        animation: crescentFly 0.9s ease-out forwards;
        z-index: 10000;
        pointer-events: none;
    }
    @keyframes crescentFly {
        0% { transform: scale(0.3) rotate(0deg); opacity: 1; }
        70% { transform: scale(1.5) rotate(20deg); opacity: 0.8; }
        100% { transform: scale(2) translateY(-150px) rotate(40deg); opacity: 0; }
    }

    /* khonshu mask */
    .khonshu-mark {
        position: fixed;
        width: 100px; height: 100px;
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="20" fill="%23dbb45c" opacity="0.5"/><path d="M30 70 Q50 90 70 70" stroke="%23c99f4a" fill="none" stroke-width="6"/></svg>');
        background-size: cover;
        pointer-events: none;
        z-index: 10001;
        animation: markFade 1s forwards;
    }
    @keyframes markFade { 0% { opacity: 0.7; transform: scale(0.5); } 100% { opacity: 0; transform: scale(2); } }
</style>
</head>

<div class="container">
    <div class="moon-dot dot-1"></div>

    <h1>𓁧 Valar Morghulis- Valar Dohaeris </h1>
    
    <div class="file-section">
        <div class="file-input-container">
            <label for="fileInput" class="file-label">𓃀 CHOOSE EXCEL FILE</label>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script>
// --- Moon Knight THEME --- same functionality, but with dramatic animations when copied

let currentData = [];
let filteredData = [];
let currentQRData = [];
let currentQRIndex = 0;
const storeID = "91KDIPL879-01";

// ---- moon knight copy animation ----
function unleashMoonKnight(x, y) {
    // glow flash
    const glow = document.createElement('div');
    glow.className = 'moon-glow';
    glow.style.setProperty('--x', x + 'px');
    glow.style.setProperty('--y', y + 'px');
    document.body.appendChild(glow);
    setTimeout(() => glow.remove(), 800);

    // flying crescents
    for (let i = 0; i < 5; i++) {
        setTimeout(() => {
            const crescent = document.createElement('div');
            crescent.className = 'crescent-strike';
            crescent.textContent = '☾';
            crescent.style.left = (x + (Math.random()*80-40)) + 'px';
            crescent.style.top = (y + (Math.random()*80-40)) + 'px';
            crescent.style.animationDuration = 0.8 + Math.random()*0.4 + 's';
            document.body.appendChild(crescent);
            setTimeout(() => crescent.remove(), 1000);
        }, i * 50);
    }
    
    // khonshu mask faint
    const mask = document.createElement('div');
    mask.className = 'khonshu-mark';
    mask.style.left = (x - 50) + 'px';
    mask.style.top = (y - 50) + 'px';
    document.body.appendChild(mask);
    setTimeout(() => mask.remove(), 900);
}

// --- helpers (Excel date/time converters) ---
function convertExcelDate(serial) {
    const date = new Date((serial - 25569) * 86400 * 1000);
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function convertExcelTime(serial) {
    const totalMilliseconds = Math.round(serial * 24 * 60 * 60 * 1000);
    const hours = String(Math.floor(totalMilliseconds / (60 * 60 * 1000))).padStart(2,'0');
    const minutes = String(Math.floor((totalMilliseconds % (60 * 60 * 1000)) / (60 * 1000))).padStart(2,'0');
    const seconds = String(Math.floor((totalMilliseconds % (60 * 1000)) / 1000)).padStart(2,'0');
    return `${hours}:${minutes}:${seconds}`;
}

function generateSurveyLink(row) {
    const receiptNo = row['Receipt No.'];
    const salesType = row['Sales Type'];
    let surveyModel = '', orderID = '', numericOT = '';
    if (/^\d+$/.test(receiptNo) && salesType === 'TAKEAWAY') { surveyModel = '6.0'; orderID = receiptNo; numericOT = '2'; }
    else if (/^\d+$/.test(receiptNo) && salesType === 'DINE-IN') { surveyModel = '6.0'; orderID = receiptNo; numericOT = '1'; }
    else if (receiptNo.startsWith('K281') && salesType === 'TAKEAWAY') { surveyModel = '4.0'; orderID = receiptNo.slice(-4); numericOT = '2'; }
    else if (receiptNo.startsWith('K281') && salesType === 'DINE-IN') { surveyModel = '4.0'; orderID = receiptNo.slice(-4); numericOT = '1'; }
    else if (receiptNo.startsWith('K281') && salesType === 'DELIVERY') { surveyModel = '3.0'; orderID = receiptNo; numericOT = '3'; }
    else { return null; }
    const date = convertExcelDate(row['Date']);
    const time = convertExcelTime(row['Time']);
    const phoneNumber = `91${row['Sell-to Contact No.']}`;
    const isoDateTime = `${date}T${time}Z`;
    const data = { "S": storeID, "OI": orderID, "D": date, "TM": time, "DTM": isoDateTime, "TI": orderID, "OT": numericOT, "SM": surveyModel, "PH": phoneNumber };
    const encodedData = btoa(JSON.stringify(data));
    return `https://customer.kfc-listens.com/jfe/form/SV_8bHC0noyvM3jPWC?Q_EED=${encodedData}`;
}

// process file
function processFile() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return showStatus('Choose a file', 'error');
    document.getElementById('processing').style.display = 'block';
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const filteredRaw = sheetData.filter(row => !(row['POS Receipt No.']||'').match(/K281SWG|K281ZMT|K281MAGIC/));
            currentData = [];
            filteredRaw.forEach(row => {
                const link = generateSurveyLink(row);
                if (link) {
                    currentData.push({
                        receiptNo: row['Receipt No.'],
                        salesType: row['Sales Type'],
                        surveyModel: link.includes('SM=6.0') ? '6.0' : link.includes('SM=4.0') ? '4.0' : link.includes('SM=3.0') ? '3.0' : 'Unknown',
                        link: link,
                        copied: false
                    });
                }
            });
            displayData(currentData);
            document.getElementById('processing').style.display = 'none';
            showStatus(`Processed ${currentData.length} records. Khonshu watches.`, 'success');
            document.getElementById('copyAllBtn').disabled = false;
            document.getElementById('exportBtn').disabled = false;
            document.getElementById('openQRBtn').disabled = false;
            document.getElementById('searchBox').disabled = false;
            document.getElementById('searchBtn').disabled = false;
            document.getElementById('clearSearchBtn').disabled = false;
            document.getElementById('salesTypeFilters').style.display = 'flex';
            generateQRCodes(currentData);
        } catch (err) {
            document.getElementById('processing').style.display = 'none';
            showStatus('Error: ' + err.message, 'error');
        }
    };
    reader.readAsArrayBuffer(file);
}

function displayData(data) {
    const tbody = document.querySelector('#linkTable tbody');
    tbody.innerHTML = '';
    data.forEach((linkData, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${linkData.receiptNo}</td>
            <td>${linkData.salesType}</td>
            <td>${linkData.surveyModel}</td>
            <td>${linkData.link}</td>
            <td><button class="copy-btn" data-index="${index}">Copy</button></td>
        `;
        tbody.appendChild(tr);
    });
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const idx = parseInt(this.getAttribute('data-index'));
            copyIndividualLink(idx, this, e);
        });
    });
}

function copyIndividualLink(index, btn, event) {
    const dataToUse = filteredData.length ? filteredData : currentData;
    if (dataToUse[index].copied) return;
    const link = dataToUse[index].link;
    const textArea = document.createElement("textarea");
    textArea.value = link;
    textArea.style.position = "fixed";
    textArea.style.left = "-999px";
    document.body.appendChild(textArea);
    textArea.select();
    try {
        if (document.execCommand('copy')) {
            dataToUse[index].copied = true;
            btn.textContent = 'Copied! ☾';
            btn.classList.add('copied');
            btn.disabled = true;
            // moon knight animation
            const rect = btn.getBoundingClientRect();
            unleashMoonKnight(rect.left + rect.width/2, rect.top + rect.height/2);
            showStatus('Link copied. The moon rises.', 'success');
        } else showStatus('Copy failed', 'error');
    } catch (err) { showStatus('Copy failed', 'error'); }
    document.body.removeChild(textArea);
}

function copyAllLinks() {
    const dataToUse = filteredData.length ? filteredData : currentData;
    const links = dataToUse.map(d => d.link).join('\n');
    const textArea = document.createElement("textarea");
    textArea.value = links;
    textArea.style.position = "fixed"; textArea.style.left = "-999px";
    document.body.appendChild(textArea);
    textArea.select();
    try {
        if (document.execCommand('copy')) {
            dataToUse.forEach(d => d.copied = true);
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.textContent = 'Copied! ☾';
                btn.classList.add('copied');
                btn.disabled = true;
            });
            const rect = document.getElementById('copyAllBtn').getBoundingClientRect();
            unleashMoonKnight(rect.left+rect.width/2, rect.top+rect.height/2);
            showStatus('All links copied. The power of Khonshu!', 'success');
        } else showStatus('Failed to copy all', 'error');
    } catch (err) { showStatus('Error', 'error'); }
    document.body.removeChild(textArea);
}

function exportToCSV() {
    const dataToUse = filteredData.length ? filteredData : currentData;
    if (!dataToUse.length) return;
    let csv = "Receipt No.,Sales Type,Survey Model,Generated Link\n";
    dataToUse.forEach(r => csv += `"${r.receiptNo}","${r.salesType}","${r.surveyModel}","${r.link}"\n`);
    const blob = new Blob([csv], {type: 'text/csv'});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "moonknight_links.csv";
    a.click();
    unleashMoonKnight(window.innerWidth/2, window.innerHeight/2);
}

function searchOrderId() {
    const term = document.getElementById('searchBox').value.trim();
    if (!term) return;
    filteredData = currentData.filter(d => d.receiptNo.includes(term));
    displayData(filteredData);
    showStatus(`Found ${filteredData.length} receipts`, 'success');
}
function clearSearch() {
    document.getElementById('searchBox').value = '';
    filteredData = [];
    displayData(currentData);
}

// QR functions
function generateQRCodes(data) {
    currentQRData = data;
    const slides = document.getElementById('qrSlides');
    slides.innerHTML = '';
    data.forEach((item, idx) => {
        const slide = document.createElement('div'); slide.className = 'qr-slide';
        const qrDiv = document.createElement('div'); qrDiv.className = 'qr-code';
        const qr = qrcode(0, 'M'); qr.addData(item.link); qr.make();
        qrDiv.innerHTML = qr.createImgTag(4);
        const info = document.createElement('div'); info.style.color = '#eedba7'; info.innerHTML = `${item.receiptNo} – ${item.salesType}`;
        slide.appendChild(qrDiv); slide.appendChild(info);
        slides.appendChild(slide);
    });
    currentQRIndex = 0; updateQRSlides(); updateQRCounter();
}
function openQRModal() { document.getElementById('qrModal').style.display = 'flex'; generateQRCodes(currentQRData); }
function closeQRModal() { document.getElementById('qrModal').style.display = 'none'; }
function nextQR() { if (currentQRIndex < currentQRData.length-1) { currentQRIndex++; updateQRSlides(); } }
function prevQR() { if (currentQRIndex > 0) { currentQRIndex--; updateQRSlides(); } }
function updateQRSlides() { document.getElementById('qrSlides').style.transform = `translateX(-${currentQRIndex*100}%)`; updateQRCounter(); }
function updateQRCounter() { document.getElementById('qrCounter').innerText = `${currentQRIndex+1} / ${currentQRData.length}`; }

// filter handlers
document.querySelectorAll('#salesTypeFilters .filter-btn').forEach(b => {
    b.addEventListener('click', function() {
        document.querySelectorAll('#salesTypeFilters .filter-btn').forEach(bb => bb.classList.remove('active'));
        this.classList.add('active');
        const type = this.dataset.type;
        if (type === 'all') displayData(currentData);
        else displayData(currentData.filter(d => d.salesType === type));
    });
});
document.querySelectorAll('#qrFilters .filter-btn').forEach(b => {
    b.addEventListener('click', function() {
        document.querySelectorAll('#qrFilters .filter-btn').forEach(bb => bb.classList.remove('active'));
        this.classList.add('active');
        const type = this.dataset.type;
        if (type === 'all') generateQRCodes(currentData);
        else generateQRCodes(currentData.filter(d => d.salesType === type));
    });
});

function showStatus(msg, type) {
    const st = document.getElementById('status');
    st.textContent = msg; st.className = `status ${type}`; st.style.display = 'block';
    setTimeout(() => st.style.display = 'none', 2800);
}
function clearData() {
    currentData = []; filteredData = []; currentQRData = [];
    document.querySelector('#linkTable tbody').innerHTML = '';
    document.getElementById('fileInput').value = ''; document.getElementById('fileName').textContent = 'No file chosen';
    document.getElementById('copyAllBtn').disabled = true; document.getElementById('exportBtn').disabled = true;
    document.getElementById('openQRBtn').disabled = true; document.getElementById('searchBox').disabled = true;
    document.getElementById('searchBtn').disabled = true; document.getElementById('clearSearchBtn').disabled = true;
    document.getElementById('salesTypeFilters').style.display = 'none'; closeQRModal();
}
document.getElementById('fileInput').addEventListener('change', function(e) {
    document.getElementById('fileName').textContent = e.target.files[0]?.name || 'No file chosen';
    document.getElementById('generateBtn').disabled = !e.target.files.length;
});
window.onload = function() { /* setup swipe not needed for brevity */ };
</script>
